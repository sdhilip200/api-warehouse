<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="api-warehouse flow: any API docs through connect, assess, checkpoint, land, validate, schedule into a warehouse">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8B949E"/>
    </marker>
    <style>
      .title  { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-weight: 700; fill: #E6EDF3; }
      .sub    { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; fill: #8B949E; }
      .pill   { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 600; fill: #E6EDF3; }
      .chip   { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; fill: #ADBAC7; }
      .muted  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8B949E; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="400" rx="16" fill="#0D1117"/>
  <rect x="0.5" y="0.5" width="1279" height="399" rx="16" fill="none" stroke="#21262D"/>

  <text class="title" x="48" y="62" font-size="34">api-warehouse</text>
  <text class="sub" x="48" y="92" font-size="16">Point a coding agent at any API's docs → assessment, sample data, and raw data landed in your warehouse.</text>

  <!-- left: API docs -->
  <rect x="48" y="190" width="150" height="86" rx="12" fill="#161B22" stroke="#30363D"/>
  <text class="pill" x="123" y="228" font-size="16" text-anchor="middle">API docs</text>
  <text class="muted" x="123" y="250" font-size="12" text-anchor="middle">(any URL)</text>

  <line x1="200" y1="233" x2="232" y2="233" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- stage pills -->
  <!-- connect -->
  <rect x="238" y="203" width="124" height="60" rx="10" fill="#161B22" stroke="#30363D"/>
  <rect x="238" y="257" width="124" height="6" rx="3" fill="#3FB950"/>
  <text class="pill" x="300" y="238" font-size="15" text-anchor="middle">connect</text>
  <!-- assess -->
  <rect x="378" y="203" width="124" height="60" rx="10" fill="#161B22" stroke="#30363D"/>
  <rect x="378" y="257" width="124" height="6" rx="3" fill="#3FB950"/>
  <text class="pill" x="440" y="238" font-size="15" text-anchor="middle">assess</text>

  <line x1="362" y1="233" x2="378" y2="233" stroke="#8B949E" stroke-width="2"/>

  <!-- checkpoint marker between assess and land -->
  <line x1="502" y1="233" x2="556" y2="233" stroke="#8B949E" stroke-width="2"/>
  <rect x="514" y="217" width="32" height="32" rx="6" transform="rotate(45 530 233)" fill="#1C2128" stroke="#D29922"/>
  <text class="muted" x="530" y="282" font-size="11" text-anchor="middle" fill="#D29922">checkpoint</text>

  <!-- land -->
  <rect x="556" y="203" width="124" height="60" rx="10" fill="#161B22" stroke="#30363D"/>
  <rect x="556" y="257" width="124" height="6" rx="3" fill="#3FB950"/>
  <text class="pill" x="618" y="238" font-size="15" text-anchor="middle">land</text>
  <!-- validate -->
  <rect x="696" y="203" width="124" height="60" rx="10" fill="#161B22" stroke="#30363D"/>
  <rect x="696" y="257" width="124" height="6" rx="3" fill="#3FB950"/>
  <text class="pill" x="758" y="238" font-size="15" text-anchor="middle">validate</text>

  <line x1="680" y1="233" x2="696" y2="233" stroke="#8B949E" stroke-width="2"/>

  <!-- schedule -->
  <rect x="836" y="203" width="124" height="60" rx="10" fill="#161B22" stroke="#30363D"/>
  <rect x="836" y="257" width="124" height="6" rx="3" fill="#3FB950"/>
  <text class="pill" x="898" y="238" font-size="15" text-anchor="middle">schedule</text>

  <line x1="820" y1="233" x2="836" y2="233" stroke="#8B949E" stroke-width="2"/>
  <line x1="960" y1="233" x2="998" y2="233" stroke="#8B949E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- right: warehouse destinations -->
  <rect x="1004" y="170" width="228" height="126" rx="12" fill="#161B22" stroke="#30363D"/>
  <text class="muted" x="1118" y="194" font-size="12" text-anchor="middle">raw → destination</text>
  <text class="chip" x="1024" y="222" font-size="13">• BigQuery</text>
  <text class="chip" x="1024" y="244" font-size="13">• Snowflake</text>
  <text class="chip" x="1024" y="266" font-size="13">• Postgres</text>
  <text class="chip" x="1128" y="222" font-size="13">• Azure SQL</text>
  <text class="chip" x="1128" y="244" font-size="13">• Files / blob</text>
  <text class="chip" x="1128" y="266" font-size="13">• DuckDB</text>

  <!-- footer line -->
  <text class="muted" x="48" y="344" font-size="13">runtime-adaptive · raw landing only · secrets via env / secrets.toml · evidence-backed incremental verdict · control-total validation</text>
  <text class="sub" x="48" y="372" font-size="12">A Claude Code plugin · built on dlt · MIT · github.com/sdhilip200/api-warehouse</text>
</svg>
